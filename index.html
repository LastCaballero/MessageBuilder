<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Message-Builder</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/theme-whatsapp.css" id="theme-whatsapp" />
  <link rel="stylesheet" href="css/theme-viber.css" id="theme-viber" disabled />
</head>
<body>
  <div class="app">
    <header class="app-header">
      <div class="app-title">Message-Builder</div>
      <button class="theme-switch" id="themeSwitch" aria-label="Theme wechseln">
        W
      </button>
    </header>

    <div class="app-controls">
      <button id="addBubbleBtn" class="btn primary">+ Neue Bubble</button>
    </div>

    <main class="bubble-list-container">
      <div id="bubbleList" class="bubble-list">
        <!-- Bubbles werden hier dynamisch eingefügt -->
      </div>
    </main>

    <footer class="app-footer">
      <button id="copyAllBtn" class="btn secondary">Alle kopieren</button>
      <button id="deleteAllBtn" class="btn danger">Alle löschen</button>
    </footer>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
