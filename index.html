<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Message Builder</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/theme-whatsapp.css" id="theme-stylesheet">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/dragdrop.css">
    <link rel="stylesheet" href="css/fullscreen.css">
</head>
<body>
    <div class="app-container">
        <!-- Oberer Bereich -->
        <header class="header">
            <h1>📱 Message Builder</h1>
            <div class="conversation-controls">
                <div class="select-wrapper">
                    <select id="conversation-select" class="conversation-select">
                        <option value="">-- Gespräch auswählen oder erstellen --</option>
                    </select>
                </div>
                <div class="button-group">
                    <button id="new-conversation-btn" class="btn btn-primary">➕ Neu</button>
                    <button id="delete-conversation-btn" class="btn btn-danger">🗑 Löschen</button>
                </div>
            </div>
            <div class="theme-controls">
                <span class="theme-label">🎨 Theme:</span>
                <div class="theme-switch">
                    <button id="theme-whatsapp" class="theme-btn active">WhatsApp</button>
                    <button id="theme-viber" class="theme-btn">Viber</button>
                </div>
            </div>
            <div id="conversation-info" class="conversation-info"></div>
        </header>

        <!-- Mittlerer Bereich (scrollbar) -->
        <main class="chat-area">
            <div id="messages-container" class="messages-container">
                <div class="empty-state">
                    <div class="empty-icon">💬</div>
                    <p>Keine Nachrichten</p>
                    <small>Erstelle ein Gespräch und schreibe eine Nachricht</small>
                </div>
            </div>
        </main>

        <!-- Unterer Bereich -->
        <footer class="input-area">
            <div class="message-type-selector">
                <button id="message-type-user" class="type-btn active">👤 Eigene Nachricht</button>
                <button id="message-type-partner" class="type-btn">👥 Gesprächspartner</button>
            </div>
            <div class="input-wrapper">
                <textarea id="message-input" placeholder="Nachricht eingeben..." rows="1"></textarea>
                <button id="send-btn" class="send-btn">➡️</button>
            </div>
        </footer>
    </div>

    <script src="js/storage.js"></script>
    <script src="js/conversation.js"></script>
    <script src="js/message.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/dragdrop.js"></script>
    <script src="js/fullscreen.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
