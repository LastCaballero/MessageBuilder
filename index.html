<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message Builder</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="container">
        <!-- Header mit Service-Switch -->
        <header class="header">
            <h1>Message Builder</h1>
            <label class="switch" id="logo_button">
                <input type="checkbox" id="toggle_switch">
                <span class="slider"></span>
                <span class="label-whatsapp">WhatsApp</span>
                <span class="label-viber">Viber</span>
            </label>
        </header>

        <!-- Message Builder Area -->
        <main class="main-content">
            <!-- Nachrichtensammlung -->
            <section class="messages-section">
                <div class="messages-header">
                    <h2>Deine Nachrichten</h2>
                    <button id="copyAllButton" class="btn btn-copy-all" title="Alle Nachrichten kopieren">
                        📋 Alle
                    </button>
                </div>
                <div class="messages-container" id="messagesContainer">
                    <!-- Sprechblasen werden hier eingefügt -->
                </div>
                <p class="empty-state" id="emptyState">Noch keine Nachrichten. Füge eine hinzu!</p>
            </section>

            <!-- Input Area -->
            <section class="input-section">
                <div class="input-group">
                    <textarea 
                        id="messageInput" 
                        placeholder="Gib deine Nachricht ein..."
                        rows="3"
                    ></textarea>
                    <button id="addButton" class="btn btn-add">
                        + Hinzufügen
                    </button>
                </div>
            </section>
        </main>
    </div>

    <script src="js/ui.js"></script>
</body>

</html>
