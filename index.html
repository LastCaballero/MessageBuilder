<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Message Builder – WhatsApp & Viber</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    /* ---------------------------------------------------
       BASE THEME VARIABLES
    --------------------------------------------------- */
    :root {
      --bg1: #e8fff1;
      --bg2: #f3e8ff;

      --block-bg: #ffffff;
      --block-border: #cccccc;
      --block-text: #1a1a1a;

      --accent: #22c55e;
      --accent-strong: #16a34a;

      --radius-lg: 16px;
      --radius-md: 10px;
      --shadow: 0 8px 25px rgba(0,0,0,0.15);

      --theme-btn-bg: #ffffff;
      --theme-btn-border: #cccccc;
      --theme-btn-active-bg: var(--accent);
      --theme-btn-active-text: #ffffff;
    }

    /* ---------------------------------------------------
       THEMES
    --------------------------------------------------- */

    /* WhatsApp */
    .theme-whatsapp {
      --bg1: #e8fff1;
      --bg2: #dfffe8;

      --block-bg: #e9ffe9;
      --block-border: #b6e8b6;
      --block-text: #0f3d0f;

      --accent: #22c55e;
      --accent-strong: #16a34a;
    }

    /* Viber */
    .theme-viber {
      --bg1: #f3e8ff;
      --bg2: #e8d4ff;

      --block-bg: #f6e9ff;
      --block-border: #d8b8ff;
      --block-text: #3d0f5a;

      --accent: #9b5de5;
      --accent-strong: #7b2cbf;
    }

    /* Neutral */
    .theme-neutral {
      --bg1: #f5f5f5;
      --bg2: #e9e9e9;

      --block-bg: #ffffff;
      --block-border: #cccccc;
      --block-text: #1a1a1a;

      --accent: #3b82f6;
      --accent-strong: #1d4ed8;
    }

    /* Dark Mode (deep blue) */
    .theme-dark {
      --bg1: #0d1b2a;
      --bg2: #1b263b;

      --block-bg: #1e2d47;
      --block-border: #415a77;
      --block-text: #e0e6ed;

      --accent: #4cc9f0;
      --accent-strong: #4895ef;

      --theme-btn-bg: #1e2d47;
      --theme-btn-border: #415a77;
      --theme-btn-active-bg: #4895ef;
      --theme-btn-active-text: #ffffff;
    }

    /* ---------------------------------------------------
       GLOBAL
    --------------------------------------------------- */
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, sans-serif;
      background: linear-gradient(135deg, var(--bg1), var(--bg2));
      display: flex;
      justify-content: center;
      padding: 16px;
      color: var(--block-text);
      transition: background 0.3s ease;
    }

    .app {
      width: 100%;
      max-width: 520px;
      background: #ffffffcc;
      border-radius: 20px;
      padding: 20px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .theme-dark .app {
      background: #0d1b2acc;
    }

    h1 {
      margin: 0;
      font-size: 1.4rem;
    }

    /* ---------------------------------------------------
       BUTTONS
    --------------------------------------------------- */
    button {
      border: none;
      cursor: pointer;
      font-family: inherit;
      transition: 0.2s ease;
    }

    .btn {
      padding: 10px 14px;
      border-radius: 999px;
      font-size: 0.9rem;
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .btn-primary {
      background: var(--accent);
      color: white;
    }

    .btn-ghost {
      background: #ffffffaa;
      border: 1px solid #ccc;
    }

    .btn-danger {
      background: #ff4d4d;
      color: white;
    }

    .btn-small {
      padding: 6px 10px;
      font-size: 0.75rem;
      border-radius: 999px;
      background: #f0f0f0;
    }

    .theme-dark .btn-small {
      background: #1e2d47;
      color: #e0e6ed;
      border: 1px solid #415a77;
    }

    /* ---------------------------------------------------
       BLOCKS
    --------------------------------------------------- */
    .blocks-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-top: 10px;
    }

    .block {
      background: var(--block-bg);
      border: 1px solid var(--block-border);
      border-radius: var(--radius-lg);
      padding: 12px;
      box-shadow: var(--shadow);
      color: var(--block-text);
    }

    .block-content {
      min-height: 60px;
      padding: 8px;
      border-radius: var(--radius-md);
      border: 1px solid var(--block-border);
      background: rgba(255,255,255,0.4);
      outline: none;
      color: var(--block-text);
    }

    .theme-dark .block-content {
      background: #0d1b2a;
      border-color: #415a77;
      color: #e0e6ed;
    }

    .block.dragging {
      opacity: 0.7;
      transform: scale(1.02);
    }

    .block-header,
    .block-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .drag-handle {
      cursor: grab;
      padding: 4px 8px;
      background: var(--block-border);
      border-radius: 8px;
      font-size: 0.7rem;
      color: var(--block-text);
    }

    /* ---------------------------------------------------
       THEME SWITCHER
    --------------------------------------------------- */
    .theme-switcher {
      display: flex;
      gap: 12px;
      margin-bottom: 4px;
    }

    .theme-btn {
      flex: 1;
      padding: 10px;
      border-radius: 12px;
      font-size: 0.85rem;
      border: 1px solid var(--theme-btn-border);
      background: var(--theme-btn-bg);
      color: var(--block-text);
      transition: 0.2s ease;
    }

    .theme-btn.active {
      background: var(--theme-btn-active-bg);
      color: var(--theme-btn-active-text);
      border-color: var(--accent-strong);
      box-shadow: 0 0 10px var(--accent);
      transform: translateY(-1px);
    }

    /* ---------------------------------------------------
       TOOLBAR
    --------------------------------------------------- */
    .toolbar {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 4px;
    }
  </style>
</head>

<body class="theme-whatsapp">
  <div class="app">

    <h1>Message Builder</h1>

    <!-- Theme Switcher -->
    <div class="theme-switcher">
      <button class="theme-btn" data-theme="whatsapp">WhatsApp</button>
      <button class="theme-btn" data-theme="viber">Viber</button>
      <button class="theme-btn" data-theme="neutral">Neutral</button>
      <button class="theme-btn" data-theme="dark">Dark</button>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
      <button class="btn btn-primary" id="addBlockBtn">＋ Neuer Block</button>
      <button class="btn btn-ghost" id="copyAllBtn">Alle kopieren</button>
      <button class="btn btn-danger" id="deleteAllBtn">Alle löschen</button>
    </div>

    <!-- Blocks -->
    <div id="blocksList" class="blocks-list"></div>

  </div>

  <script>
    const blocksList = document.getElementById("blocksList");
    const addBlockBtn = document.getElementById("addBlockBtn");
    const copyAllBtn = document.getElementById("copyAllBtn");
    const deleteAllBtn = document.getElementById("deleteAllBtn");

    let dragSrcEl = null;

    /* ---------------------------------------------------
       THEME SWITCHER
    --------------------------------------------------- */
    const themeButtons = document.querySelectorAll(".theme-btn");

    function setTheme(name) {
      document.body.className = "theme-" + name;
      localStorage.setItem("theme", name);

      themeButtons.forEach(btn => {
        btn.classList.toggle("active", btn.dataset.theme === name);
      });
    }

    const savedTheme = localStorage.getItem("theme") || "whatsapp";
    setTheme(savedTheme);

    themeButtons.forEach(btn => {
      btn.onclick = () => setTheme(btn.dataset.theme);
    });

    /* ---------------------------------------------------
       AUTOSAVE
    --------------------------------------------------- */
    function saveBlocks() {
      const blocks = [...document.querySelectorAll(".block-content")];
      const texts = blocks.map(b => b.textContent);
      localStorage.setItem("blocks", JSON.stringify(texts));
    }

    function loadBlocks() {
      const saved = localStorage.getItem("blocks");
      if (!saved) return createBlock();

      const texts = JSON.parse(saved);
      if (!texts.length) return createBlock();

      texts.forEach(t => createBlock(t));
    }

    /* ---------------------------------------------------
       CREATE BLOCK
    --------------------------------------------------- */
    function createBlock(initialText = "") {
      const block = document.createElement("div");
      block.className = "block";
      block.draggable = true;

      block.innerHTML = `
        <div class="block-header">
          <div class="drag-handle">☰ Ziehen</div>
          <div style="display:flex; gap:6px;">
            <button class="btn-small copy-block">Kopieren</button>
            <button class="btn-small delete-block">✕</button>
          </div>
        </div>

        <div class="block-content" contenteditable="true"></div>

        <div class="block-footer">
          <span class="meta">0 Zeichen</span>
        </div>
      `;

      const content = block.querySelector(".block-content");
      const meta = block.querySelector(".meta");

      content.textContent = initialText;
      meta.textContent = content.textContent.length + " Zeichen";

      content.addEventListener("input", () => {
        meta.textContent = content.textContent.length + " Zeichen";
        saveBlocks();
      });

      block.querySelector(".copy-block").onclick = () => {
        navigator.clipboard.writeText(content.textContent.trim());
      };

      block.querySelector(".delete-block").onclick = () => {
        block.remove();
        saveBlocks();
      };

      /* Drag & Drop */
      block.addEventListener("dragstart", () => {
        dragSrcEl = block;
        block.classList.add("dragging");
      });

      block.addEventListener("dragend", () => {
        block.classList.remove("dragging");
        dragSrcEl = null;
        saveBlocks();
      });

      block.addEventListener("dragover", (e) => {
        e.preventDefault();
        const target = block;
        if (dragSrcEl === target) return;

        const rect = target.getBoundingClientRect();
        const offset = e.clientY - rect.top;
        const before = offset < rect.height / 2;

        blocksList.insertBefore(dragSrcEl, before ? target : target.nextSibling);
      });

      blocksList.appendChild(block);
      saveBlocks();
    }

    addBlockBtn.onclick = () => createBlock();

    /* ---------------------------------------------------
       NEW: SIMPLE "COPY ALL" (NO POPUPS)
    --------------------------------------------------- */
    copyAllBtn.onclick = () => {
      const blocks = [...document.querySelectorAll(".block-content")];
      const texts = blocks.map(b => b.textContent.trim()).filter(t => t);

      const combined = texts.join("\n\n");

      navigator.clipboard.writeText(combined).catch(() => {
        const textarea = document.createElement("textarea");
        textarea.value = combined;
        textarea.style.position = "fixed";
        textarea.style.opacity = "0";
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand("copy");
        document.body.removeChild(textarea);
      });
    };

    /* ---------------------------------------------------
       DELETE ALL BLOCKS
    --------------------------------------------------- */
    deleteAllBtn.onclick = () => {
      if (!confirm("Alle Textblöcke wirklich löschen?")) return;
      blocksList.innerHTML = "";
      localStorage.removeItem("blocks");
      createBlock();
    };

    /* Load saved blocks on start */
    loadBlocks();
  </script>
</body>
</html>
